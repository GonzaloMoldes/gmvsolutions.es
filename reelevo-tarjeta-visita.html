<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>REELEVO — Tarjeta de Visita</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- QR generado inline con la librería qrcode.js CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --o:#F4521E;
  --od:#C43A10;
  --dark:#0A0A0A;
  --white:#F5F5F5;
}
body{
  font-family:'DM Sans',Helvetica,sans-serif;
  background:#7a7a7a;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  padding:24px;
  color:var(--dark);
}
h1,h2,h3{font-family:'Oswald','Impact',sans-serif;}

/* ── CARD BASE 85×54 mm ── */
.card{
  width:85mm;
  height:55mm;
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
@media print{
  body{background:#fff;padding:6mm;gap:8mm;}
  .label{display:none;}
  .card{}
  @page{size:200mm 160mm;margin:0;}
}

/* ── FRONT ── */
.front{
  background:var(--dark);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  padding:6mm 7mm 6.5mm;
}
/* Decorative orange accent top-right */
.front::before{
  content:'';
  position:absolute;
  top:-10mm; right:-10mm;
  width:34mm; height:34mm;
  border-radius:50%;
  background:rgba(244,82,30,.14);
}
/* Thin bottom orange line */
.front::after{
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:2.5px;
  background:linear-gradient(90deg,var(--o),var(--od));
}

.front-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  position:relative;z-index:2;
}
.brand-block .logo{
  font-family:'Oswald',sans-serif;
  font-weight:700;
  font-size:13.5pt;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--white);
  line-height:1;
}
.brand-block .logo span{color:var(--o);}
.brand-block .logo-sub{
  font-size:5.5pt;
  text-transform:uppercase;
  letter-spacing:.14em;
  color:rgba(255,255,255,.32);
  margin-top:1mm;
}
.role-badge{
  background:rgba(244,82,30,.15);
  border:1px solid rgba(244,82,30,.3);
  border-radius:12px;
  padding:1.2mm 3mm;
  font-size:6.5pt;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.10em;
  color:var(--o);
  white-space:nowrap;
  align-self:flex-start;
  margin-top:.5mm;
}

.front-middle{
  position:relative;z-index:2;
}
.person-name{
  font-family:'Oswald',sans-serif;
  font-size:16pt;
  font-weight:600;
  color:var(--white);
  line-height:.96;
  letter-spacing:-.01em;
}

.front-bottom{
  display:flex;
  flex-direction:column;
  gap:2mm;
  position:relative;z-index:2;
}
.contact-row{
  display:flex;
  align-items:center;
  gap:2mm;
}
.contact-row svg{
  width:10px;height:10px;
  color:var(--o);
  flex-shrink:0;
}
.contact-row span{
  font-size:7.2pt;
  color:rgba(255,255,255,.68);
  font-weight:400;
}
.contact-row span.accent{
  color:var(--o);
  font-weight:500;
}

/* ── BACK ── */
.back{
  background:var(--dark);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8mm;
  padding:5mm 7mm;
}
.back::before{
  content:'';
  position:absolute;
  inset:0;
  background:
    radial-gradient(ellipse 70% 70% at 15% 50%,rgba(244,82,30,.10),transparent),
    radial-gradient(ellipse 50% 50% at 85% 50%,rgba(244,82,30,.06),transparent);
}
.back-left{
  position:relative;z-index:2;
  display:flex;
  flex-direction:column;
  gap:3.5mm;
}
.back-logo{
  font-family:'Oswald',sans-serif;
  font-weight:700;
  font-size:18pt;
  letter-spacing:.18em;
  text-transform:uppercase;
  color:var(--white);
  line-height:1;
}
.back-logo span{color:var(--o);}
.back-tagline{
  font-size:6.5pt;
  color:rgba(255,255,255,.38);
  text-transform:uppercase;
  letter-spacing:.12em;
  line-height:1.5;
  max-width:42mm;
}
.back-url{
  font-size:7.5pt;
  font-weight:600;
  color:var(--o);
  letter-spacing:.04em;
}
.back-divider{
  width:1px;
  height:30mm;
  background:rgba(255,255,255,.10);
  position:relative;z-index:2;
}
.back-right{
  position:relative;z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:2mm;
}
#qrcode{
  background:#fff;
  padding:2mm;
  border-radius:2mm;
  display:inline-block;
  line-height:0;
}
#qrcode img,#qrcode canvas{
  width:22mm !important;
  height:22mm !important;
  display:block;
}
.qr-label{
  font-size:5.8pt;
  color:rgba(255,255,255,.32);
  text-transform:uppercase;
  letter-spacing:.10em;
  text-align:center;
}

/* ── UI LABELS ── */
.label{
  font-family:'DM Sans',sans-serif;
  font-size:10px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.12em;
  color:rgba(255,255,255,.45);
  background:rgba(0,0,0,.35);
  padding:3px 10px;
  border-radius:20px;
  margin-top:4px;
}
</style>
</head>
<body>

<!-- FRONT -->
<div class="label">DELANTERA</div>
<div class="card front">

  <!-- Top: logo + role -->
  <div class="front-top">
    <div class="brand-block">
      <div class="logo">REEL<span>EVO</span></div>
      <div class="logo-sub">by GMV Solutions</div>
    </div>
    <div class="role-badge">Comercial</div>
  </div>

  <!-- Middle: name -->
  <div class="front-middle">
    <div class="person-name">Gonzalo<br>Moldes</div>
  </div>

  <!-- Bottom: contact -->
  <div class="front-bottom">
    <div class="contact-row">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6">
        <rect x="1" y="2.5" width="10" height="7" rx="1.5"/>
        <path d="M1 4l5 3.5L11 4"/>
      </svg>
      <span>gonzalomoldes@gmvsolutions.es</span>
    </div>
    <div class="contact-row">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6">
        <path d="M2 2h2.5l1 2.5-1.5 1a6.5 6.5 0 003 3l1-1.5L10.5 8V10.5A1.5 1.5 0 019 12C4.5 12 0 7.5 0 3A1.5 1.5 0 012 2z"/>
      </svg>
      <span class="accent">+34 671 887 372</span>
    </div>
    <div class="contact-row">
      <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="6" cy="6" r="5"/>
        <path d="M6 1v5l3 2"/>
      </svg>
      <span class="accent">gmvsolutions.es</span>
    </div>
  </div>

</div>

<!-- BACK -->
<div class="label">TRASERA</div>
<div class="card back">

  <div class="back-left">
    <div>
      <div class="back-logo">REEL<span>EVO</span></div>
    </div>
    <div class="back-tagline">Software operativo para pymes industriales</div>
    <div class="back-url">gmvsolutions.es</div>
  </div>

  <div class="back-divider"></div>

  <div class="back-right">
    <div id="qrcode"></div>
    <div class="qr-label">Escanea para<br>conocer REELEVO</div>
  </div>

</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://gmvsolutions.es",
    width: 84,
    height: 84,
    colorDark: "#0A0A0A",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>

</body>
</html>
